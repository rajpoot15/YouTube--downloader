<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #ff0000; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>YouTube Downloader</h2>
    <input type="text" id="videoUrl" placeholder="Paste YouTube Link Here..." required>
    
    <select id="format">
        <option value="mp3">Audio (MP3)</option>
        <option value="mp4">Video (MP4)</option>
    </select>
    
    <button onclick="openDownload()">Get Download Link</button>
</div>

<script>
    function openDownload() {
        let url = document.getElementById('videoUrl').value;
        let format = document.getElementById('format').value;
        
        if(url === "") {
            alert("Please paste a link first!");
            return;
        }

        // This uses the 'ssyoutube' shortcut method which is very stable
        let targetUrl = `https://www.ssyoutube.com/watch?v=${extractVideoID(url)}`;
        
        window.open(targetUrl, '_blank');
    }

    function extractVideoID(url) {
        var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
        var match = url.match(regExp);
        return (match&&match[7].length==11)? match[7] : false;
    }
</script>

</body>
</html>
