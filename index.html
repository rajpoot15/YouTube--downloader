<div class="container">
    <h2>YouTube Downloader</h2>
    <input type="text" id="videoUrl" placeholder="Paste YouTube Link Here..." required>
    <button onclick="goToDownloader()">Go to Downloader</button>
</div>

<script>
    function goToDownloader() {
        let url = document.getElementById('videoUrl').value;
        if(url === "") { alert("Please paste a link!"); return; }
        // Opens the service in a new tab; users can paste the link themselves
        window.open('https://en.savefrom.net/', '_blank'); 
    }
</script>
